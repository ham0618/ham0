<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Tour | Gesture Control Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Pretendard', sans-serif; }

        #video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 1;
        }

        #webcam-container {
            position: fixed; bottom: 30px; left: 30px; width: 320px; height: 180px;
            background: #000; border: 2px solid #0f0; border-radius: 12px;
            overflow: hidden; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #webcam { display: none; }
        #canvas { width: 100%; height: 100%; transform: scaleX(-1); display: block; }

        #status-card {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.85); color: #fff; padding: 20px;
            border-radius: 12px; border: 1px solid #333; min-width: 260px;
            backdrop-filter: blur(10px);
        }
        .label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: #0f0; font-weight: bold; font-family: 'JetBrains Mono', monospace; font-size: 18px; }
        .progress-bar { width: 100%; height: 6px; background: #222; margin-top: 12px; border-radius: 3px; overflow: hidden; }
        #fill { height: 100%; background: linear-gradient(90deg, #0f0, #008000); width: 0%; }

        #loading {
            position: fixed; inset: 0; background: #000; color: #0f0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<video id="video" src="01.mp4" preload="auto" muted></video>

<div id="loading">
    <div style="font-size: 24px; margin-bottom: 10px;">PROXIMITY ENGINE</div>
    <div id="load-msg" style="font-size: 12px; color: #555;">Initializing Neural Networks...</div>
</div>

<div id="status-card">
    <div style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px;">
        <span style="color: #0f0; font-weight: 800; font-size: 14px;">G-CONTROL ACTIVE</span>
    </div>
    <div style="margin-bottom: 8px;">
        <p class="label">Action</p>
        <p id="g-stat" class="value" style="color: #fff;">READY</p>
    </div>
    <div>
        <p class="label">Playback Rate</p>
        <p id="s-stat" class="value">0.0x</p>
    </div>
    <div class="progress-bar"><div id="fill"></div></div>
</div>

<div id="webcam-container">
    <video id="webcam" playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
    const video = document.getElementById('video');
    const webcam = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fill = document.getElementById('fill');
    
    // --- 감도 조절 파라미터 ---
    const PINCH_VAL = 0.045;   // 모으기 (되감기)
    const OPEN_VAL = 0.12;     // 벌리기 (재생)
    const SMOOTHING = 0.2;     // 필터링 (0.1 ~ 0.3 권장)
    
    let smoothedDistance = 0;
    let targetRate = 0;
    let lastTime = performance.now();

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.75,
        minTrackingConfidence: 0.75
    });

    hands.onResults(onResults);

    // [핵심 로직] 비디오 상태 업데이트 루프
    function update() {
        const now = performance.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        const isAtEnd = video.currentTime >= video.duration - 0.01;
        const isAtStart = video.currentTime <= 0;

        if (targetRate > 0) {
            // 재생 (벌리기)
            if (isAtEnd) {
                // 영상 끝이면 멈춤 유지
                video.pause();
                video.currentTime = video.duration;
                document.getElementById('g-stat').textContent = "FINISHED";
                document.getElementById('g-stat').style.color = "#ff4d4d";
                document.getElementById('s-stat').textContent = "0.0x";
            } else {
                video.playbackRate = targetRate;
                if (video.paused) video.play().catch(()=>{});
                document.getElementById('g-stat').textContent = "FORWARDING";
                document.getElementById('g-stat').style.color = "#0f0";
                document.getElementById('s-stat').textContent = targetRate.toFixed(1) + "x";
            }
        } else if (targetRate < 0) {
            // 되감기 (모으기)
            video.pause();
            if (isAtStart) {
                video.currentTime = 0;
                document.getElementById('g-stat').textContent = "START POINT";
                document.getElementById('g-stat').style.color = "#aaa";
            } else {
                const rewindSpeed = Math.abs(targetRate) * dt;
                video.currentTime -= rewindSpeed;
                document.getElementById('g-stat').textContent = "REWINDING";
                document.getElementById('g-stat').style.color = "#ff9900";
            }
            document.getElementById('s-stat').textContent = targetRate.toFixed(1) + "x";
        } else {
            // 정지 (중간 상태)
            video.pause();
            document.getElementById('g-stat').textContent = isAtEnd ? "FINISHED" : "PAUSED";
            document.getElementById('g-stat').style.color = isAtEnd ? "#ff4d4d" : "#fff";
            document.getElementById('s-stat').textContent = "0.0x";
        }

        // 프로그레스 바
        if (video.duration) {
            fill.style.width = (video.currentTime / video.duration * 100) + "%";
        }

        requestAnimationFrame(update);
    }

    function onResults(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            const dist = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);

            // 필터링 적용
            smoothedDistance = (dist * SMOOTHING) + (smoothedDistance * (1 - SMOOTHING));

            if (smoothedDistance < PINCH_VAL) {
                targetRate = -3.0; // 되감기 속도
            } else if (smoothedDistance > OPEN_VAL) {
                const speed = 0.5 + (smoothedDistance - OPEN_VAL) * 12;
                targetRate = Math.min(speed, 4.0); // 최대 4배속
            } else {
                targetRate = 0;
            }

            // 시각화 (깔끔하게 수정)
            drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: '#0f0', lineWidth: 3});
            // 엄지, 검지 포인트만 크게 강조
            [4, 8].forEach(idx => {
                ctx.beginPath();
                ctx.arc(landmarks[idx].x * canvas.width, landmarks[idx].y * canvas.height, 6, 0, 2*Math.PI);
                ctx.fillStyle = "#fff";
                ctx.fill();
            });
        } else {
            targetRate = 0;
        }
        ctx.restore();
    }

    async function init() {
        const camera = new Camera(webcam, {
            onFrame: async () => { await hands.send({image: webcam}); },
            width: 640, height: 360
        });

        video.onloadedmetadata = () => {
            document.getElementById('loading').style.display = 'none';
            camera.start();
            update();
        };
        
        // 영상 소스 로드 확인
        video.load();
    }

    window.onload = init;
</script>
</body>
</html>
