<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>핀치 제스처 비디오 컨트롤</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      #video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
      }

      #webcam-container {
        position: fixed;
        bottom: 30px;
        left: 30px;
        width: 400px;
        height: 225px;
        background: #000;
        border: 3px solid #333;
        border-radius: 10px;
        overflow: hidden;
        z-index: 100;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
      }

      #webcam {
        display: none;
      }

      #canvas {
        width: 100%;
        height: 100%;
        display: block;
        transform: scaleX(-1);
      }

      #gesture-guide {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.9);
        color: #0f0;
        padding: 8px 15px;
        border-radius: 5px;
        font-size: 12px;
        z-index: 20;
        font-weight: bold;
        text-align: center;
        border: 2px solid #0f0;
      }

      #status {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 20px 25px;
        border-radius: 10px;
        font-size: 14px;
        z-index: 1000;
        min-width: 320px;
        border: 2px solid #333;
      }

      #status h3 {
        color: #0f0;
        margin-bottom: 15px;
        font-size: 16px;
        border-bottom: 1px solid #333;
        padding-bottom: 8px;
      }

      #status div {
        margin: 8px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .label {
        color: #aaa;
        font-size: 13px;
      }

      .value {
        color: #0f0;
        font-weight: bold;
        font-size: 14px;
      }

      .value.playing {
        color: #00ff00;
        animation: pulse 1s infinite;
      }

      .value.rewinding {
        color: #ff6600;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      #progress-bar {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #333;
      }

      #progress-track {
        width: 100%;
        height: 8px;
        background: #333;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }

      #progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #0f0, #0a0);
        width: 0%;
        transition: width 0.1s ease;
        border-radius: 4px;
      }

      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.95);
        color: white;
        padding: 30px 60px;
        border-radius: 12px;
        font-size: 18px;
        z-index: 2000;
        border: 2px solid #333;
        text-align: center;
      }

      #loading-status {
        margin-top: 12px;
        font-size: 14px;
        color: #aaa;
      }

      #instructions {
        position: fixed;
        top: 50%;
        right: 30px;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 25px;
        border-radius: 10px;
        font-size: 14px;
        z-index: 1000;
        max-width: 280px;
        border: 2px solid #0f0;
      }

      #instructions h3 {
        color: #0f0;
        margin-bottom: 15px;
        font-size: 16px;
      }

      #instructions ul {
        list-style: none;
        padding: 0;
      }

      #instructions li {
        margin: 12px 0;
        padding-left: 25px;
        position: relative;
      }

      #instructions li:before {
        content: "👉";
        position: absolute;
        left: 0;
      }

      @media (max-width: 768px) {
        #webcam-container {
          width: 320px;
          height: 180px;
          bottom: 15px;
          left: 15px;
        }

        #instructions {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <video id="video" src="01.mp4" preload="auto" muted></video>

    <div id="webcam-container">
      <div id="gesture-guide">👌 엄지와 검지를 벌리세요</div>
      <video id="webcam" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
    </div>

    <div id="status">
      <h3>📊 상태 정보</h3>
      <div>
        <span class="label">손 감지:</span>
        <span class="value" id="hand-status">❌ 없음</span>
      </div>
      <div>
        <span class="label">제스처:</span>
        <span class="value" id="gesture-status">⏸️ 대기</span>
      </div>
      <div>
        <span class="label">손가락 거리:</span>
        <span class="value" id="distance">0.0</span>
      </div>
      <div>
        <span class="label">비디오 상태:</span>
        <span class="value" id="video-state">⏸️ 정지</span>
      </div>
      <div>
        <span class="label">현재 시간:</span>
        <span class="value" id="position">0.0초</span>
      </div>
      <div>
        <span class="label">FPS:</span>
        <span class="value" id="fps">0</span>
      </div>
      <div id="progress-bar">
        <div id="progress-track">
          <div id="progress-fill"></div>
        </div>
      </div>
    </div>

    <div id="instructions">
      <h3>🎮 사용 방법</h3>
      <ul>
        <li><strong>손가락 벌리기:</strong><br>엄지와 검지를 벌리면<br>영상이 앞으로 재생</li>
        <li><strong>손가락 모으기:</strong><br>엄지와 검지를 모으면<br>영상이 뒤로 되감기</li>
        <li><strong>거리 조절:</strong><br>손가락 거리에 따라<br>재생 속도 조절</li>
      </ul>
    </div>

    <div id="loading">
      <div>🎥 시스템 초기화 중...</div>
      <div id="loading-status">준비 중...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script>
      const video = document.getElementById("video");
      const webcam = document.getElementById("webcam");
      const canvas = document.getElementById("canvas");
      const canvasCtx = canvas.getContext("2d");
      const loadingEl = document.getElementById("loading");
      const loadingStatusEl = document.getElementById("loading-status");
      const gestureGuide = document.getElementById("gesture-guide");

      const handStatusEl = document.getElementById("hand-status");
      const gestureStatusEl = document.getElementById("gesture-status");
      const distanceEl = document.getElementById("distance");
      const videoStateEl = document.getElementById("video-state");
      const positionEl = document.getElementById("position");
      const fpsEl = document.getElementById("fps");
      const progressFill = document.getElementById("progress-fill");

      // 상수
      const PINCH_THRESHOLD = 0.05;  // 손가락 모은 상태 임계값
      const OPEN_THRESHOLD = 0.15;   // 손가락 벌린 상태 임계값
      const PLAYBACK_SPEED = 0.033;  // 재생 속도 (초/프레임)
      const REWIND_SPEED = 0.033;    // 되감기 속도 (초/프레임)

      // 상태
      let isProcessing = false;
      let lastFrameTime = Date.now();
      let frameCount = 0;
      let fps = 0;
      let cameraReady = false;
      let handsReady = false;
      
      let currentDistance = 0;
      let isPlaying = false;
      let isRewinding = false;
      let currentTime = 0;

      // MediaPipe Hands 설정
      const hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        },
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7,
      });

      hands.onResults(onResults);

      // 웹캠 초기화
      async function initCamera() {
        try {
          console.log("📷 카메라 초기화 시작");
          loadingStatusEl.textContent = "카메라 권한 요청 중...";

          const devices = await navigator.mediaDevices.enumerateDevices();
          const videoDevices = devices.filter(device => device.kind === 'videoinput');
          console.log(`📹 발견된 카메라: ${videoDevices.length}개`);

          if (videoDevices.length === 0) {
            throw new Error("카메라를 찾을 수 없습니다.");
          }

          const constraints = {
            video: {
              width: { ideal: 1280 },
              height: { ideal: 720 },
              aspectRatio: { ideal: 16/9 },
              facingMode: "user",
              frameRate: { ideal: 30 }
            },
            audio: false
          };

          loadingStatusEl.textContent = "카메라 스트림 요청 중...";
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          
          console.log("✅ 카메라 스트림 획득");
          loadingStatusEl.textContent = "카메라 설정 중...";

          webcam.srcObject = stream;
          
          return new Promise((resolve, reject) => {
            const timeout = setTimeout(() => {
              reject(new Error("카메라 로딩 타임아웃"));
            }, 10000);

            webcam.onloadedmetadata = () => {
              clearTimeout(timeout);
              
              webcam.play().then(() => {
                canvas.width = 640;
                canvas.height = 360;
                
                console.log(`✅ 카메라 준비 완료: ${canvas.width}x${canvas.height}`);
                loadingStatusEl.textContent = "카메라 준비 완료";
                
                cameraReady = true;
                resolve();
              }).catch(err => {
                clearTimeout(timeout);
                reject(new Error("카메라 재생 실패: " + err.message));
              });
            };

            webcam.onerror = (err) => {
              clearTimeout(timeout);
              reject(new Error("카메라 오류: " + err.message));
            };
          });
        } catch (err) {
          console.error("카메라 오류:", err);
          
          if (err.name === 'NotAllowedError') {
            alert("카메라 권한이 거부되었습니다. 브라우저 설정에서 카메라 권한을 허용해주세요.");
          } else if (err.name === 'NotFoundError') {
            alert("카메라를 찾을 수 없습니다.");
          } else {
            alert("카메라 오류: " + err.message);
          }
          throw err;
        }
      }

      // 엄지와 검지 사이 거리 계산
      function calculatePinchDistance(landmarks) {
        const thumbTip = landmarks[4];   // 엄지 끝
        const indexTip = landmarks[8];   // 검지 끝

        const dx = thumbTip.x - indexTip.x;
        const dy = thumbTip.y - indexTip.y;
        const dz = (thumbTip.z || 0) - (indexTip.z || 0);
        
        const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
        return distance;
      }

      // 손 결과 처리
      function onResults(results) {
        if (!cameraReady) return;

        // FPS 계산
        frameCount++;
        const now = Date.now();
        if (now - lastFrameTime >= 1000) {
          fps = frameCount;
          fpsEl.textContent = fps;
          frameCount = 0;
          lastFrameTime = now;
        }

        // 캔버스 초기화
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

        // 웹캠 영상 그리기
        canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
          const landmarks = results.multiHandLandmarks[0];

          // 엄지와 검지 거리 계산
          currentDistance = calculatePinchDistance(landmarks);
          distanceEl.textContent = currentDistance.toFixed(3);

          // 제스처 판단
          if (currentDistance < PINCH_THRESHOLD) {
            // 손가락 모음 → 되감기
            isPlaying = false;
            isRewinding = true;
            gestureStatusEl.textContent = "⏪ 되감기";
            gestureStatusEl.className = "value rewinding";
            gestureGuide.textContent = "⏪ 되감는 중...";
            gestureGuide.style.borderColor = "#ff6600";
            gestureGuide.style.color = "#ff6600";
          } else if (currentDistance > OPEN_THRESHOLD) {
            // 손가락 벌림 → 재생
            isPlaying = true;
            isRewinding = false;
            gestureStatusEl.textContent = "▶️ 재생";
            gestureStatusEl.className = "value playing";
            gestureGuide.textContent = "▶️ 재생 중...";
            gestureGuide.style.borderColor = "#00ff00";
            gestureGuide.style.color = "#00ff00";
          } else {
            // 중간 상태 → 일시정지
            isPlaying = false;
            isRewinding = false;
            gestureStatusEl.textContent = "⏸️ 일시정지";
            gestureStatusEl.className = "value";
            gestureGuide.textContent = "⏸️ 일시정지";
            gestureGuide.style.borderColor = "#0f0";
            gestureGuide.style.color = "#0f0";
          }

          // 손 그리기
          const handColor = isPlaying ? "#00FF00" : (isRewinding ? "#FF6600" : "#FFAA00");
          
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
            color: handColor,
            lineWidth: 2,
          });
          drawLandmarks(canvasCtx, landmarks, {
            color: "#FF0000",
            fillColor: handColor,
            lineWidth: 1,
            radius: 3,
          });

          // 엄지와 검지 강조
          const thumbTip = landmarks[4];
          const indexTip = landmarks[8];

          // 연결선 그리기
          canvasCtx.beginPath();
          canvasCtx.moveTo(thumbTip.x * canvas.width, thumbTip.y * canvas.height);
          canvasCtx.lineTo(indexTip.x * canvas.width, indexTip.y * canvas.height);
          canvasCtx.strokeStyle = handColor;
          canvasCtx.lineWidth = 3;
          canvasCtx.stroke();

          // 엄지 강조
          canvasCtx.beginPath();
          canvasCtx.arc(
            thumbTip.x * canvas.width,
            thumbTip.y * canvas.height,
            8,
            0,
            2 * Math.PI
          );
          canvasCtx.fillStyle = handColor;
          canvasCtx.fill();
          canvasCtx.strokeStyle = "#FFF";
          canvasCtx.lineWidth = 2;
          canvasCtx.stroke();

          // 검지 강조
          canvasCtx.beginPath();
          canvasCtx.arc(
            indexTip.x * canvas.width,
            indexTip.y * canvas.height,
            8,
            0,
            2 * Math.PI
          );
          canvasCtx.fillStyle = handColor;
          canvasCtx.fill();
          canvasCtx.strokeStyle = "#FFF";
          canvasCtx.lineWidth = 2;
          canvasCtx.stroke();

          handStatusEl.textContent = "✅ 감지됨";
          handStatusEl.style.color = "#0f0";
        } else {
          // 손 없음
          isPlaying = false;
          isRewinding = false;
          handStatusEl.textContent = "❌ 없음";
          handStatusEl.style.color = "#f00";
          gestureStatusEl.textContent = "⏸️ 대기";
          gestureStatusEl.className = "value";
          gestureGuide.textContent = "👌 엄지와 검지를 보여주세요";
          gestureGuide.style.borderColor = "#0f0";
          gestureGuide.style.color = "#0f0";
        }

        canvasCtx.restore();
        isProcessing = false;
      }

      // 프레임 처리
      let lastProcessTime = 0;
      const PROCESS_INTERVAL = 33;

      async function processFrame() {
        if (!cameraReady || !handsReady) {
          requestAnimationFrame(processFrame);
          return;
        }

        const now = Date.now();
        
        if (!isProcessing && 
            webcam.readyState === webcam.HAVE_ENOUGH_DATA &&
            now - lastProcessTime >= PROCESS_INTERVAL) {
          isProcessing = true;
          lastProcessTime = now;
          try {
            await hands.send({ image: webcam });
          } catch (err) {
            console.error("프레임 처리 오류:", err);
            isProcessing = false;
          }
        }
        requestAnimationFrame(processFrame);
      }

      // 비디오 업데이트
      function updateVideo() {
        if (video.duration && !isNaN(video.duration)) {
          // 재생
          if (isPlaying) {
            currentTime += PLAYBACK_SPEED;
            if (currentTime > video.duration) {
              currentTime = video.duration;
            }
            videoStateEl.textContent = "▶️ 재생 중";
            videoStateEl.className = "value playing";
          }
          // 되감기
          else if (isRewinding) {
            currentTime -= REWIND_SPEED;
            if (currentTime < 0) {
              currentTime = 0;
            }
            videoStateEl.textContent = "⏪ 되감기 중";
            videoStateEl.className = "value rewinding";
          }
          // 정지
          else {
            videoStateEl.textContent = "⏸️ 정지";
            videoStateEl.className = "value";
          }

          // 비디오 시간 업데이트
          video.currentTime = currentTime;

          // UI 업데이트
          positionEl.textContent = `${currentTime.toFixed(1)}초 / ${video.duration.toFixed(1)}초`;
          
          const progress = (currentTime / video.duration) * 100;
          progressFill.style.width = `${progress}%`;
        }

        requestAnimationFrame(updateVideo);
      }

      // 초기화
      async function init() {
        try {
          console.log("🚀 초기화 시작");
          
          // 1. 비디오 로드
          loadingStatusEl.textContent = "비디오 로딩 중...";
          video.load();
          
          await new Promise((resolve) => {
            video.addEventListener('loadeddata', () => {
              console.log("✅ 비디오 로드 완료");
              loadingStatusEl.textContent = "비디오 로드 완료";
              currentTime = 0;
              resolve();
            }, { once: true });
          });

          // 2. 카메라 초기화
          await initCamera();

          // 3. MediaPipe Hands 준비
          loadingStatusEl.textContent = "AI 모델 준비 중...";
          await new Promise(resolve => setTimeout(resolve, 1000));
          handsReady = true;
          console.log("✅ AI 모델 준비 완료");
          loadingStatusEl.textContent = "준비 완료!";

          // 4. 로딩 화면 숨기기
          setTimeout(() => {
            loadingEl.style.display = "none";
          }, 500);
          
          // 5. 시작
          processFrame();
          updateVideo();
          
          console.log("✅ 모든 초기화 완료!");
        } catch (err) {
          console.error("초기화 실패:", err);
          loadingEl.innerHTML = `
            <div>❌ 초기화 실패</div>
            <div style="margin-top: 10px; font-size: 14px; color: #f00;">${err.message}</div>
            <div style="margin-top: 10px; font-size: 12px; color: #aaa;">페이지를 새로고침해주세요</div>
          `;
        }
      }

      // 비디오 자동 재생 방지
      video.addEventListener("play", () => {
        video.pause();
      });

      // 메모리 정리
      window.addEventListener("beforeunload", () => {
        if (webcam.srcObject) {
          webcam.srcObject.getTracks().forEach(track => track.stop());
        }
      });

      window.addEventListener("load", init);
    </script>
  </body>
</html>
