<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>손 제스처 비디오 컨트롤</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      #video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
      }

      #webcam-container {
        position: fixed;
        bottom: 30px;
        left: 30px;
        width: 400px;
        height: 225px; /* 16:9 비율 */
        background: #000;
        border: 3px solid #333;
        border-radius: 10px;
        overflow: hidden;
        z-index: 100;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
      }

      #webcam {
        display: none;
      }

      #canvas {
        width: 100%;
        height: 100%;
        display: block;
        transform: scaleX(-1);
      }

      #detection-zone {
        position: absolute;
        border: 3px dashed #00ff00;
        background: rgba(0, 255, 0, 0.1);
        pointer-events: none;
        z-index: 10;
        border-radius: 8px;
        transition: all 0.2s ease;
      }

      #detection-zone.active {
        background: rgba(0, 255, 0, 0.25);
        border-color: #00ff00;
        border-width: 4px;
        box-shadow: 0 0 30px rgba(0, 255, 0, 0.6), inset 0 0 20px rgba(0, 255, 0, 0.2);
      }

      #zone-info {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: #0f0;
        padding: 6px 12px;
        border-radius: 5px;
        font-size: 11px;
        z-index: 20;
        font-weight: bold;
      }

      #status {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.85);
        color: white;
        padding: 15px 20px;
        border-radius: 8px;
        font-size: 14px;
        z-index: 1000;
        min-width: 280px;
        border: 2px solid #333;
      }

      #status div {
        margin: 6px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .label {
        color: #aaa;
        font-size: 12px;
      }

      .value {
        color: #0f0;
        font-weight: bold;
        font-size: 13px;
      }

      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.95);
        color: white;
        padding: 25px 50px;
        border-radius: 10px;
        font-size: 18px;
        z-index: 2000;
        border: 2px solid #333;
      }

      @media (max-width: 768px) {
        #webcam-container {
          width: 320px;
          height: 180px;
          bottom: 15px;
          left: 15px;
        }
      }
    </style>
  </head>
  <body>
    <!-- preload="metadata"로 변경하여 메모리 절약 -->
    <video id="video" src="01.mp4" preload="metadata"></video>

    <div id="webcam-container">
      <div id="zone-info">✋ 이 영역에 손을 펼치세요</div>
      <video id="webcam" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <div id="detection-zone"></div>
    </div>

    <div id="status">
      <div>
        <span class="label">손 감지:</span>
        <span class="value" id="hand-status">❌ 아니오</span>
      </div>
      <div>
        <span class="label">영역 내:</span>
        <span class="value" id="in-zone">❌ 아니오</span>
      </div>
      <div>
        <span class="label">손 펼침:</span>
        <span class="value" id="openness">0%</span>
      </div>
      <div>
        <span class="label">비디오:</span>
        <span class="value" id="position">0.0초</span>
      </div>
      <div>
        <span class="label">FPS:</span>
        <span class="value" id="fps">0</span>
      </div>
    </div>

    <div id="loading">🎥 카메라 및 AI 모델 로딩 중...</div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script>
      const video = document.getElementById("video");
      const webcam = document.getElementById("webcam");
      const canvas = document.getElementById("canvas");
      const canvasCtx = canvas.getContext("2d");
      const loadingEl = document.getElementById("loading");
      const detectionZone = document.getElementById("detection-zone");

      const handStatusEl = document.getElementById("hand-status");
      const inZoneEl = document.getElementById("in-zone");
      const opennessEl = document.getElementById("openness");
      const positionEl = document.getElementById("position");
      const fpsEl = document.getElementById("fps");

      // 상수
      const MIN_RATIO = 1.0;
      const MAX_RATIO = 2.2;
      const LERP_FACTOR = 0.15;

      // 감지 영역 설정 (캔버스 기준 비율 - 넉넉하게)
      const ZONE = {
        x: 0.1,       // 좌측 10%
        y: 0.1,       // 상단 10%
        width: 0.8,   // 너비 80%
        height: 0.8   // 높이 80%
      };

      // 상태
      let currentSeekRatio = 0;
      let targetSeekRatio = 0;
      let isProcessing = false;
      let isHandInZone = false;
      let lastFrameTime = Date.now();
      let frameCount = 0;
      let fps = 0;

      // MediaPipe Hands 설정 (성능 최적화)
      const hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        },
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,  // 1 → 0 (가벼운 모델)
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });

      hands.onResults(onResults);

      // 웹캠 설정 (해상도 낮춤)
      async function initCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: 1280 },  // 1920 → 1280
              height: { ideal: 720 },  // 1080 → 720
              aspectRatio: { ideal: 16/9 },
              facingMode: "user",
              frameRate: { ideal: 30 }
            },
            audio: false
          });

          webcam.srcObject = stream;
          
          return new Promise((resolve) => {
            webcam.onloadedmetadata = () => {
              webcam.play();
              
              // 캔버스 해상도 낮춤 (성능 향상)
              canvas.width = 640;   // 1920 → 640
              canvas.height = 360;  // 1080 → 360
              
              // 감지 영역 표시
              updateDetectionZone();
              
              console.log(`카메라 해상도: ${canvas.width}x${canvas.height}`);
              resolve();
            };
          });
        } catch (err) {
          console.error("웹캠 오류:", err);
          alert("웹캠에 접근할 수 없습니다. 카메라 권한을 허용해주세요.");
          throw err;
        }
      }

      // 감지 영역 표시 업데이트
      function updateDetectionZone() {
        detectionZone.style.left = `${ZONE.x * 100}%`;
        detectionZone.style.top = `${ZONE.y * 100}%`;
        detectionZone.style.width = `${ZONE.width * 100}%`;
        detectionZone.style.height = `${ZONE.height * 100}%`;
      }

      // 손이 감지 영역 안에 있는지 확인
      function isHandInDetectionZone(landmarks) {
        // 손바닥 중심점들
        const wrist = landmarks[0];
        const thumbCMC = landmarks[1];
        const indexMCP = landmarks[5];
        const middleMCP = landmarks[9];
        const ringMCP = landmarks[13];
        const pinkyMCP = landmarks[17];
        
        // 손바닥 중심 계산
        const centerX = (wrist.x + thumbCMC.x + indexMCP.x + middleMCP.x + ringMCP.x + pinkyMCP.x) / 6;
        const centerY = (wrist.y + thumbCMC.y + indexMCP.y + middleMCP.y + ringMCP.y + pinkyMCP.y) / 6;

        // 영역 내에 있는지 확인
        const inZone = 
          centerX >= ZONE.x && 
          centerX <= (ZONE.x + ZONE.width) &&
          centerY >= ZONE.y && 
          centerY <= (ZONE.y + ZONE.height);

        return inZone;
      }

      function onResults(results) {
        // FPS 계산
        frameCount++;
        const now = Date.now();
        if (now - lastFrameTime >= 1000) {
          fps = frameCount;
          fpsEl.textContent = fps;
          frameCount = 0;
          lastFrameTime = now;
        }

        // 캔버스 초기화
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

        // 웹캠 영상 그리기
        canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        // 감지 영역 그리기
        canvasCtx.strokeStyle = isHandInZone ? "#00ff00" : "#00ff0088";
        canvasCtx.lineWidth = 3;
        canvasCtx.setLineDash([15, 8]);
        canvasCtx.strokeRect(
          ZONE.x * canvas.width,
          ZONE.y * canvas.height,
          ZONE.width * canvas.width,
          ZONE.height * canvas.height
        );
        canvasCtx.setLineDash([]);

        if (
          results.multiHandLandmarks &&
          results.multiHandLandmarks.length > 0
        ) {
          const landmarks = results.multiHandLandmarks[0];

          // 손이 영역 안에 있는지 확인
          isHandInZone = isHandInDetectionZone(landmarks);

          // 손 랜드마크 그리기
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
            color: isHandInZone ? "#00FF00" : "#FF6600",
            lineWidth: 3,
          });
          drawLandmarks(canvasCtx, landmarks, {
            color: isHandInZone ? "#FF0000" : "#FFAA00",
            fillColor: isHandInZone ? "#00FF00" : "#FF6600",
            lineWidth: 1,
            radius: 4,
          });

          // UI 업데이트
          handStatusEl.textContent = "✅ 예";
          handStatusEl.style.color = "#0f0";

          if (isHandInZone) {
            // 영역 안에 있을 때만 손 펼침 정도 계산
            const openness = calculateHandOpenness(landmarks);
            targetSeekRatio = openness;
            
            inZoneEl.textContent = "✅ 예";
            inZoneEl.style.color = "#0f0";
            opennessEl.textContent = `${Math.round(openness * 100)}%`;
            
            detectionZone.classList.add("active");
          } else {
            inZoneEl.textContent = "❌ 아니오";
            inZoneEl.style.color = "#ff6600";
            detectionZone.classList.remove("active");
          }
        } else {
          isHandInZone = false;
          handStatusEl.textContent = "❌ 아니오";
          handStatusEl.style.color = "#f00";
          inZoneEl.textContent = "❌ 아니오";
          inZoneEl.style.color = "#f00";
          detectionZone.classList.remove("active");
        }

        canvasCtx.restore();
        isProcessing = false;
      }

      function calculateHandOpenness(landmarks) {
        const WRIST = 0;
        const THUMB_TIP = 4;
        const INDEX_TIP = 8;
        const MIDDLE_TIP = 12;
        const MIDDLE_MCP = 9;
        const RING_TIP = 16;
        const PINKY_TIP = 20;

        const wrist = landmarks[WRIST];
        const thumbTip = landmarks[THUMB_TIP];
        const indexTip = landmarks[INDEX_TIP];
        const middleTip = landmarks[MIDDLE_TIP];
        const middleMCP = landmarks[MIDDLE_MCP];
        const ringTip = landmarks[RING_TIP];
        const pinkyTip = landmarks[PINKY_TIP];

        function distance(p1, p2) {
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const dz = (p1.z || 0) - (p2.z || 0);
          return Math.sqrt(dx * dx + dy * dy + dz * dz);
        }

        // 손바닥 크기
        const palmSize = distance(wrist, middleMCP);
        
        // 모든 손가락 끝과 손목 사이 거리
        const avgDistance =
          (distance(thumbTip, wrist) +
            distance(indexTip, wrist) +
            distance(middleTip, wrist) +
            distance(ringTip, wrist) +
            distance(pinkyTip, wrist)) /
          5;

        const ratio = avgDistance / palmSize;
        const normalized = (ratio - MIN_RATIO) / (MAX_RATIO - MIN_RATIO);
        const clamped = Math.max(0, Math.min(1, normalized));

        return clamped;
      }

      // 프레임 처리 (throttle 적용)
      let lastProcessTime = 0;
      const PROCESS_INTERVAL = 33; // 약 30fps

      async function processFrame() {
        const now = Date.now();
        
        if (!isProcessing && 
            webcam.readyState === webcam.HAVE_ENOUGH_DATA &&
            now - lastProcessTime >= PROCESS_INTERVAL) {
          isProcessing = true;
          lastProcessTime = now;
          try {
            await hands.send({ image: webcam });
          } catch (err) {
            console.error("프레임 처리 오류:", err);
            isProcessing = false;
          }
        }
        requestAnimationFrame(processFrame);
      }

      // 비디오 업데이트 최적화
      let lastUpdateTime = 0;
      const UPDATE_INTERVAL = 16; // 약 60fps

      function updateVideo() {
        const now = Date.now();
        
        if (now - lastUpdateTime >= UPDATE_INTERVAL) {
          lastUpdateTime = now;
          
          // 영역 안에 손이 있을 때만 부드럽게 이동
          if (isHandInZone) {
            currentSeekRatio += (targetSeekRatio - currentSeekRatio) * LERP_FACTOR;
          }

          if (video.duration && !isNaN(video.duration)) {
            const targetTime = currentSeekRatio * video.duration;
            
            // 비디오 시간 업데이트 (작은 변화는 무시)
            if (Math.abs(video.currentTime - targetTime) > 0.1) {
              video.currentTime = targetTime;
            }

            positionEl.textContent = `${targetTime.toFixed(1)}초 / ${video.duration.toFixed(1)}초`;
          }
        }

        requestAnimationFrame(updateVideo);
      }

      async function init() {
        try {
          // 비디오 로드 대기
          video.load();
          
          await initCamera();
          loadingEl.style.display = "none";
          processFrame();
          console.log("✅ 초기화 완료");
        } catch (err) {
          loadingEl.textContent = "❌ 초기화 실패: " + err.message;
          loadingEl.style.color = "#f00";
        }
      }

      video.addEventListener("loadedmetadata", () => {
        updateVideo();
      });

      video.addEventListener("play", () => {
        video.pause();
      });

      // 메모리 정리
      window.addEventListener("beforeunload", () => {
        if (webcam.srcObject) {
          webcam.srcObject.getTracks().forEach(track => track.stop());
        }
      });

      window.addEventListener("load", init);
      window.addEventListener("resize", updateDetectionZone);
    </script>
  </body>
</html>
