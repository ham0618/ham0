<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Tour | Gesture Reviewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; background: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            cursor: pointer; /* 클릭 유도 */
        }

        /* 메인 비디오: 전체 화면 */
        #video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 1;
        }

        /* 웹캠: 좌측 하단 (PC에서 크게 유지) */
        #webcam-container {
            position: fixed; bottom: 30px; left: 30px; 
            width: 400px; height: 300px; 
            background: #000; border: 3px solid #0f0; border-radius: 16px;
            overflow: hidden; z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #webcam { display: none; }
        #canvas { width: 100%; height: 100%; transform: scaleX(-1); display: block; }

        /* 상태 가이드: 심플하게 상단 중앙 */
        #status-guide {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; color: #0f0; font-weight: bold; font-size: 16px;
            background: rgba(0,0,0,0.7); padding: 10px 25px; border-radius: 30px;
            border: 1px solid #333; pointer-events: none;
            letter-spacing: 1px;
        }

        /* 최초 안내 (클릭하면 사라짐) */
        #init-msg {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); color: #0f0; font-size: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

<video id="video" src="01.mp4" preload="auto" muted playsinline></video>

<div id="init-msg">화면을 클릭하면 시동합니다.</div>
<div id="status-guide">READY</div>

<div id="webcam-container">
    <video id="webcam" playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
    const video = document.getElementById('video');
    const webcam = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const guide = document.getElementById('status-guide');
    const initMsg = document.getElementById('init-msg');
    
    // --- 설정값 (1배속 고정 최적화) ---
    const PINCH_VAL = 0.06;   // 이 값보다 작으면 역재생
    const OPEN_VAL = 0.12;    // 이 값보다 크면 정재생
    const SMOOTHING = 0.3;    // 손떨림 방지 필터
    
    let smoothedDist = 0.1;
    let targetMode = 0; // -1: 역재생, 0: 정지, 1: 정재생
    let lastTime = performance.now();
    let isStarted = false;

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1, // 맥북 사양에 맞춰 정확도 높임
        minDetectionConfidence: 0.8,
        minTrackingConfidence: 0.8
    });

    hands.onResults(onResults);

    // [핵심 루프] 비디오 제어
    function update() {
        const now = performance.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        const isAtEnd = video.currentTime >= video.duration - 0.05;
        const isAtStart = video.currentTime <= 0.05;

        if (targetMode === 1) {
            // 정방향: 딱 1배속 (너무 빠르지 않게)
            if (isAtEnd) {
                video.pause();
                guide.textContent = "FINISHED";
                guide.style.color = "#f44";
            } else {
                video.playbackRate = 1.0; 
                if (video.paused) video.play().catch(()=>{});
                guide.textContent = "PLAYING (1.0x)";
                guide.style.color = "#0f0";
            }
        } else if (targetMode === -1) {
            // 역방향: 딱 1배속 (끊김 방지용 정속)
            video.pause();
            if (isAtStart) {
                video.currentTime = 0;
                guide.textContent = "START POINT";
                guide.style.color = "#888";
            } else {
                // 수동으로 1초당 1초씩 뒤로 감 (1.0x 역재생)
                video.currentTime -= dt; 
                guide.textContent = "REWINDING (1.0x)";
                guide.style.color = "#f90";
            }
        } else {
            // 정지
            video.pause();
            guide.textContent = isAtEnd ? "FINISHED" : "PAUSED";
            guide.style.color = "#fff";
        }

        requestAnimationFrame(update);
    }

    function onResults(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const lm = results.multiHandLandmarks[0];
            const dist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);

            smoothedDist = (dist * SMOOTHING) + (smoothedDist * (1 - SMOOTHING));

            // 모드 결정
            if (smoothedDist < PINCH_VAL) {
                targetMode = -1; // 모으면 역재생
            } else if (smoothedDist > OPEN_VAL) {
                targetMode = 1;  // 벌리면 정재생
            } else {
                targetMode = 0;  // 중간은 정지
            }

            // 시각화
            drawConnectors(ctx, lm, HAND_CONNECTIONS, {color: '#0f0', lineWidth: 3});
        } else {
            targetMode = 0;
        }
        ctx.restore();
    }

    // 화면 클릭 시 시스템 시작
    window.addEventListener('click', async () => {
        if (isStarted) return;
        
        initMsg.textContent = "시동 중...";
        
        try {
            const camera = new Camera(webcam, {
                onFrame: async () => { await hands.send({image: webcam}); },
                width: 640, height: 480
            });
            await camera.start();
            
            video.play().then(() => video.pause()); // 비디오 잠금 해제
            
            initMsg.style.display = 'none';
            isStarted = true;
            update();
        } catch (err) {
            alert("카메라를 켤 수 없습니다. 권한을 확인해주세요.");
        }
    }, { once: true });
</script>
</body>
</html>
