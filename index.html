<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pink Tour | Mobile Gesture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { overflow: hidden; background: #000; font-family: sans-serif; }

        /* 메인 비디오: 전체 화면 */
        #video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 1;
        }

        /* 웹캠: 모바일에서는 우측 하단에 작게 배치 */
        #webcam-container {
            position: fixed; bottom: 20px; right: 20px; 
            width: 140px; height: 105px; /* 4:3 비율 */
            background: #000; border: 2px solid #0f0; border-radius: 10px;
            overflow: hidden; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #webcam { display: none; }
        #canvas { width: 100%; height: 100%; transform: scaleX(-1); display: block; }

        /* 상단 텍스트 가이드 (모바일용 심플 UI) */
        #mobile-guide {
            position: fixed; top: 20px; width: 100%; text-align: center;
            z-index: 1000; color: #0f0; font-weight: bold; font-size: 14px;
            text-shadow: 0 0 5px #000; pointer-events: none;
        }

        /* 시작 버튼 (모바일 필수) */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; color: #fff; cursor: pointer;
        }
        #start-btn {
            padding: 15px 40px; border: 2px solid #0f0; color: #0f0;
            background: transparent; font-size: 18px; font-weight: bold;
            border-radius: 30px; transition: 0.3s;
        }

        /* 데스크탑 전용 UI 숨기기 (모바일 모드) */
        @media (max-width: 768px) {
            #desktop-status { display: none !important; }
        }

        /* 데스크탑 상태창 (사양 좋은 PC에서 볼 때용) */
        #desktop-status {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.7); color: #fff; padding: 15px;
            border-radius: 10px; font-size: 12px; min-width: 180px;
        }
    </style>
</head>
<body>

<video id="video" src="01.mp4" preload="auto" muted playsinline></video>

<div id="overlay">
    <div style="margin-bottom: 20px; font-size: 20px;">Pink Tour Gesture System</div>
    <button id="start-btn">TAP TO START</button>
    <div style="margin-top: 15px; font-size: 12px; color: #888;">카메라 권한이 필요합니다.</div>
</div>

<div id="mobile-guide">READY</div>

<div id="desktop-status">
    <div style="color:#0f0; margin-bottom:5px;">SYSTEM ACTIVE</div>
    <div>Mode: <span id="mode-text">IDLE</span></div>
    <div>Rate: <span id="rate-text">0.0x</span></div>
</div>

<div id="webcam-container">
    <video id="webcam" playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
    const video = document.getElementById('video');
    const webcam = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const guide = document.getElementById('mobile-guide');
    
    // --- 감도 조절 (모바일 환경에 맞춰 약간 완화) ---
    const PINCH_VAL = 0.05;   
    const OPEN_VAL = 0.13;    
    const SMOOTHING = 0.25;   
    
    let smoothedDistance = 0;
    let targetRate = 0;
    let lastTime = performance.now();
    let isInitialized = false;

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    // 모바일 성능 고려 (Complexity 0으로 설정하면 배터리 소모가 적고 빠름)
    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0, 
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });

    hands.onResults(onResults);

    function update() {
        const now = performance.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        const isAtEnd = video.currentTime >= video.duration - 0.05;
        const isAtStart = video.currentTime <= 0.05;

        if (targetRate > 0) {
            if (isAtEnd) {
                video.pause();
                updateUI("FINISHED", "#ff4d4d", "0.0x");
            } else {
                video.playbackRate = targetRate;
                if (video.paused) video.play().catch(()=>{});
                updateUI("PLAYING", "#0f0", targetRate.toFixed(1) + "x");
            }
        } else if (targetRate < 0) {
            video.pause();
            if (isAtStart) {
                updateUI("START", "#fff", "0.0x");
            } else {
                video.currentTime -= Math.abs(targetRate) * dt;
                updateUI("REWINDING", "#f90", targetRate.toFixed(1) + "x");
            }
        } else {
            video.pause();
            updateUI(isAtEnd ? "FINISHED" : "PAUSED", "#fff", "0.0x");
        }

        requestAnimationFrame(update);
    }

    function updateUI(status, color, rate) {
        guide.textContent = status;
        guide.style.color = color;
        document.getElementById('mode-text').textContent = status;
        document.getElementById('rate-text').textContent = rate;
    }

    function onResults(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            const dist = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);

            smoothedDistance = (dist * SMOOTHING) + (smoothedDistance * (1 - SMOOTHING));

            if (smoothedDistance < PINCH_VAL) {
                targetRate = -2.5;
            } else if (smoothedDistance > OPEN_VAL) {
                targetRate = Math.min(0.5 + (smoothedDistance - OPEN_VAL) * 10, 3.0);
            } else {
                targetRate = 0;
            }

            // 시각화: 모바일은 화면이 작으니 핵심 선만
            drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: '#0f0', lineWidth: 2});
        } else {
            targetRate = 0;
        }
        ctx.restore();
    }

    // 모바일 시작 처리
    document.getElementById('overlay').addEventListener('click', async () => {
        if (isInitialized) return;
        
        document.getElementById('start-btn').textContent = "LOADING...";
        
        try {
            // 1. 카메라 시동
            const camera = new Camera(webcam, {
                onFrame: async () => { await hands.send({image: webcam}); },
                width: 480, height: 360 // 모바일은 낮은 해상도가 유리
            });
            
            await camera.start();
            
            // 2. 비디오 준비
            video.play().then(() => {
                video.pause(); // 첫 재생 성공 후 일시정지
            });
            
            document.getElementById('overlay').style.display = 'none';
            isInitialized = true;
            update(); 
        } catch (err) {
            alert("카메라를 시작할 수 없습니다: " + err);
        }
    });
</script>
</body>
</html>
