<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>손 제스처 비디오 컨트롤</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      #main-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
      }

      #video-section {
        flex: 1;
        position: relative;
        background: #000;
      }

      #video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #webcam-section {
        width: 400px;
        position: relative;
        background: #1a1a1a;
        border-left: 3px solid #333;
      }

      #webcam {
        display: none;
      }

      #canvas {
        width: 100%;
        height: 100%;
        transform: scaleX(-1);
      }

      #detection-zone {
        position: absolute;
        border: 3px dashed #00ff00;
        background: rgba(0, 255, 0, 0.1);
        pointer-events: none;
        z-index: 10;
        border-radius: 10px;
      }

      #detection-zone.active {
        background: rgba(0, 255, 0, 0.2);
        border-color: #00ff00;
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
      }

      #status {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 15px 20px;
        border-radius: 8px;
        font-size: 14px;
        z-index: 1000;
        max-width: 350px;
      }

      #status div {
        margin: 5px 0;
      }

      .label {
        color: #aaa;
        font-size: 12px;
      }

      .value {
        color: #0f0;
        font-weight: bold;
      }

      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 20px 40px;
        border-radius: 8px;
        font-size: 16px;
        z-index: 2000;
      }

      #zone-info {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: #0f0;
        padding: 8px 15px;
        border-radius: 5px;
        font-size: 12px;
        z-index: 100;
      }

      @media (max-width: 768px) {
        #main-container {
          flex-direction: column;
        }
        #webcam-section {
          width: 100%;
          height: 300px;
          border-left: none;
          border-top: 3px solid #333;
        }
      }
    </style>
  </head>
  <body>
    <div id="main-container">
      <div id="video-section">
        <video id="video" src="01.mp4"></video>
      </div>

      <div id="webcam-section">
        <div id="zone-info">✋ 이 영역에 손을 펼치세요</div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div id="detection-zone"></div>
      </div>
    </div>

    <div id="status">
      <div>
        <span class="label">손 감지:</span>
        <span class="value" id="hand-status">아니오</span>
      </div>
      <div>
        <span class="label">영역 내 위치:</span>
        <span class="value" id="in-zone">아니오</span>
      </div>
      <div>
        <span class="label">손 펼침 정도:</span>
        <span class="value" id="openness">0.00</span>
      </div>
      <div>
        <span class="label">비디오 위치:</span>
        <span class="value" id="position">0.0초</span>
      </div>
    </div>

    <div id="loading">카메라 및 모델 로딩 중...</div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script>
      const video = document.getElementById("video");
      const webcam = document.getElementById("webcam");
      const canvas = document.getElementById("canvas");
      const canvasCtx = canvas.getContext("2d");
      const loadingEl = document.getElementById("loading");
      const detectionZone = document.getElementById("detection-zone");

      const handStatusEl = document.getElementById("hand-status");
      const inZoneEl = document.getElementById("in-zone");
      const opennessEl = document.getElementById("openness");
      const positionEl = document.getElementById("position");

      // 상수
      const MIN_RATIO = 1.0;
      const MAX_RATIO = 2.2;
      const LERP_FACTOR = 0.12;

      // 감지 영역 설정 (캔버스 기준 비율)
      const ZONE = {
        x: 0.15,      // 좌측 15%
        y: 0.15,      // 상단 15%
        width: 0.7,   // 너비 70%
        height: 0.7   // 높이 70%
      };

      // 상태
      let currentSeekRatio = 0;
      let targetSeekRatio = 0;
      let isProcessing = false;
      let isHandInZone = false;

      // MediaPipe Hands 설정
      const hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        },
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });

      hands.onResults(onResults);

      // 웹캠 설정
      async function initCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: 1280 },
              height: { ideal: 720 },
              facingMode: "user",
              frameRate: { ideal: 30 }
            },
            audio: false
          });

          webcam.srcObject = stream;
          
          return new Promise((resolve) => {
            webcam.onloadedmetadata = () => {
              webcam.play();
              canvas.width = webcam.videoWidth;
              canvas.height = webcam.videoHeight;
              
              // 감지 영역 표시
              updateDetectionZone();
              
              console.log(`카메라 해상도: ${canvas.width}x${canvas.height}`);
              resolve();
            };
          });
        } catch (err) {
          console.error("웹캠 오류:", err);
          alert("웹캠에 접근할 수 없습니다. 카메라 권한을 허용해주세요.");
          throw err;
        }
      }

      // 감지 영역 표시 업데이트
      function updateDetectionZone() {
        const webcamSection = document.getElementById("webcam-section");
        const rect = webcamSection.getBoundingClientRect();
        
        detectionZone.style.left = `${ZONE.x * 100}%`;
        detectionZone.style.top = `${ZONE.y * 100}%`;
        detectionZone.style.width = `${ZONE.width * 100}%`;
        detectionZone.style.height = `${ZONE.height * 100}%`;
      }

      // 손이 감지 영역 안에 있는지 확인
      function isHandInDetectionZone(landmarks) {
        // 손바닥 중심 (손목, 중지 뿌리, 새끼 뿌리의 평균)
        const wrist = landmarks[0];
        const middleMCP = landmarks[9];
        const pinkyMCP = landmarks[17];
        
        const centerX = (wrist.x + middleMCP.x + pinkyMCP.x) / 3;
        const centerY = (wrist.y + middleMCP.y + pinkyMCP.y) / 3;

        // 영역 내에 있는지 확인
        const inZone = 
          centerX >= ZONE.x && 
          centerX <= (ZONE.x + ZONE.width) &&
          centerY >= ZONE.y && 
          centerY <= (ZONE.y + ZONE.height);

        return inZone;
      }

      function onResults(results) {
        // 캔버스 초기화
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

        // 웹캠 영상 그리기
        canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        // 감지 영역 그리기
        canvasCtx.strokeStyle = "#00ff00";
        canvasCtx.lineWidth = 3;
        canvasCtx.setLineDash([10, 5]);
        canvasCtx.strokeRect(
          ZONE.x * canvas.width,
          ZONE.y * canvas.height,
          ZONE.width * canvas.width,
          ZONE.height * canvas.height
        );
        canvasCtx.setLineDash([]);

        if (
          results.multiHandLandmarks &&
          results.multiHandLandmarks.length > 0
        ) {
          const landmarks = results.multiHandLandmarks[0];

          // 손이 영역 안에 있는지 확인
          isHandInZone = isHandInDetectionZone(landmarks);

          // 손 랜드마크 그리기
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
            color: isHandInZone ? "#00FF00" : "#FF6600",
            lineWidth: 2,
          });
          drawLandmarks(canvasCtx, landmarks, {
            color: isHandInZone ? "#FF0000" : "#FFAA00",
            lineWidth: 1,
            radius: 3,
          });

          // UI 업데이트
          handStatusEl.textContent = "예";
          handStatusEl.style.color = "#0f0";

          if (isHandInZone) {
            // 영역 안에 있을 때만 손 펼침 정도 계산
            const openness = calculateHandOpenness(landmarks);
            targetSeekRatio = openness;
            
            inZoneEl.textContent = "예 ✓";
            inZoneEl.style.color = "#0f0";
            opennessEl.textContent = openness.toFixed(2);
            
            detectionZone.classList.add("active");
          } else {
            inZoneEl.textContent = "아니오";
            inZoneEl.style.color = "#ff6600";
            detectionZone.classList.remove("active");
          }
        } else {
          isHandInZone = false;
          handStatusEl.textContent = "아니오";
          handStatusEl.style.color = "#f00";
          inZoneEl.textContent = "아니오";
          inZoneEl.style.color = "#f00";
          detectionZone.classList.remove("active");
        }

        canvasCtx.restore();
        isProcessing = false;
      }

      function calculateHandOpenness(landmarks) {
        const WRIST = 0;
        const INDEX_TIP = 8;
        const MIDDLE_TIP = 12;
        const MIDDLE_MCP = 9;
        const RING_TIP = 16;
        const PINKY_TIP = 20;

        const wrist = landmarks[WRIST];
        const indexTip = landmarks[INDEX_TIP];
        const middleTip = landmarks[MIDDLE_TIP];
        const middleMCP = landmarks[MIDDLE_MCP];
        const ringTip = landmarks[RING_TIP];
        const pinkyTip = landmarks[PINKY_TIP];

        function distance(p1, p2) {
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const dz = (p1.z || 0) - (p2.z || 0);
          return Math.sqrt(dx * dx + dy * dy + dz * dz);
        }

        const palmSize = distance(wrist, middleMCP);
        const avgDistance =
          (distance(indexTip, wrist) +
            distance(middleTip, wrist) +
            distance(ringTip, wrist) +
            distance(pinkyTip, wrist)) /
          4;

        const ratio = avgDistance / palmSize;
        const normalized = (ratio - MIN_RATIO) / (MAX_RATIO - MIN_RATIO);
        const clamped = Math.max(0, Math.min(1, normalized));

        return clamped;
      }

      async function processFrame() {
        if (!isProcessing && webcam.readyState === webcam.HAVE_ENOUGH_DATA) {
          isProcessing = true;
          try {
            await hands.send({ image: webcam });
          } catch (err) {
            console.error("프레임 처리 오류:", err);
            isProcessing = false;
          }
        }
        requestAnimationFrame(processFrame);
      }

      function updateVideo() {
        // 영역 안에 손이 있을 때만 부드럽게 이동
        if (isHandInZone) {
          currentSeekRatio += (targetSeekRatio - currentSeekRatio) * LERP_FACTOR;
        }

        if (video.duration && !isNaN(video.duration)) {
          const targetTime = currentSeekRatio * video.duration;
          video.currentTime = targetTime;

          positionEl.textContent = `${targetTime.toFixed(
            1
          )}초 / ${video.duration.toFixed(1)}초`;
        }

        requestAnimationFrame(updateVideo);
      }

      async function init() {
        try {
          await initCamera();
          loadingEl.style.display = "none";
          processFrame();
          console.log("초기화 완료");
        } catch (err) {
          loadingEl.textContent = "초기화 실패: " + err.message;
          loadingEl.style.color = "#f00";
        }
      }

      video.addEventListener("loadedmetadata", () => {
        updateVideo();
      });

      video.addEventListener("play", () => {
        video.pause();
      });

      window.addEventListener("load", init);
      window.addEventListener("resize", updateDetectionZone);
    </script>
  </body>
</html>
