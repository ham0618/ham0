<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pink Tour | Dynamic Gesture Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { overflow: hidden; background: #000; font-family: sans-serif; }

        #video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 1;
        }

        /* 웹캠: 모바일 최적화 (깔끔하게 우측 하단) */
        #webcam-container {
            position: fixed; bottom: 20px; right: 20px; 
            width: 120px; height: 90px;
            background: #000; border: 2px solid #0f0; border-radius: 12px;
            overflow: hidden; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #webcam { display: none; }
        #canvas { width: 100%; height: 100%; transform: scaleX(-1); display: block; }

        /* 가이드 텍스트 (모바일 미니멀) */
        #status-guide {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; color: #0f0; font-weight: bold; font-size: 14px;
            text-shadow: 0 0 8px rgba(0,0,0,0.8); pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 6px 18px; border-radius: 20px;
            letter-spacing: 1px; transition: all 0.2s;
        }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; color: #fff; cursor: pointer;
        }
        #start-btn {
            padding: 16px 45px; border: 2px solid #0f0; color: #0f0;
            background: transparent; font-size: 18px; font-weight: bold;
            border-radius: 35px; margin-top: 20px;
        }

        @media (max-width: 768px) {
            #status-guide { font-size: 12px; top: 20px; }
            #webcam-container { width: 100px; height: 75px; bottom: 15px; right: 15px; }
        }
    </style>
</head>
<body>

<video id="video" src="01.mp4" preload="auto" muted playsinline></video>

<div id="overlay">
    <div style="font-size: 24px; font-weight: 900; color: #0f0;">DYNAMIC SCRUBBER</div>
    <div style="margin-top: 10px; font-size: 13px; color: #888; text-align: center; line-height: 1.6;">
        손가락을 좁히면 <span style="color:#f90">역재생</span><br>
        손가락을 벌리면 <span style="color:#0f0">정재생</span>
    </div>
    <button id="start-btn">시작하기</button>
</div>

<div id="status-guide">준비됨</div>

<div id="webcam-container">
    <video id="webcam" playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
    const video = document.getElementById('video');
    const webcam = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const guide = document.getElementById('status-guide');
    
    // --- [중요] 제스처 구간 설정 ---
    const NEUTRAL_ZONE = { min: 0.08, max: 0.12 }; // 이 구간(0.08~0.12)에선 정지
    const SMOOTHING = 0.25; // 부드러움 필터
    
    let smoothedDist = 0.1; 
    let targetRate = 0;
    let lastTime = performance.now();
    let isInitialized = false;

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0, 
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    // 프레임 업데이트 루프
    function update() {
        const now = performance.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        const isAtEnd = video.currentTime >= video.duration - 0.05;
        const isAtStart = video.currentTime <= 0.05;

        if (targetRate > 0) {
            // 정방향 재생
            if (isAtEnd) {
                video.pause();
                updateUI("FINISHED", "#ff4d4d");
            } else {
                video.playbackRate = targetRate;
                if (video.paused) video.play().catch(()=>{});
                updateUI(`PLAYING: ${targetRate.toFixed(1)}x`, "#0f0");
            }
        } else if (targetRate < 0) {
            // 역방향 재생 (가변 속도 적용)
            video.pause();
            if (isAtStart) {
                video.currentTime = 0;
                updateUI("START POINT", "#aaa");
            } else {
                // targetRate가 음수이므로 빼주는 형식으로 역재생 구현
                video.currentTime += targetRate * dt;
                updateUI(`REWINDING: ${Math.abs(targetRate).toFixed(1)}x`, "#f90");
            }
        } else {
            // 중립 (정지)
            video.pause();
            updateUI(isAtEnd ? "FINISHED" : "PAUSED", "#fff");
        }

        requestAnimationFrame(update);
    }

    function updateUI(txt, color) {
        guide.textContent = txt;
        guide.style.color = color;
    }

    function onResults(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const lm = results.multiHandLandmarks[0];
            const rawDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);

            // 필터링으로 떨림 방지
            smoothedDist = (rawDist * SMOOTHING) + (smoothedDist * (1 - SMOOTHING));

            // 가변 속도 로직 (역재생 포함)
            if (smoothedDist < NEUTRAL_ZONE.min) {
                // [역재생 구간] 0.08에서 0으로 갈수록 빨라짐
                const ratio = (NEUTRAL_ZONE.min - smoothedDist) / NEUTRAL_ZONE.min;
                targetRate = -(ratio * 5.0); // 최대 5배속 역재생
            } else if (smoothedDist > NEUTRAL_ZONE.max) {
                // [정재생 구간] 0.12에서 0.3으로 갈수록 빨라짐
                const ratio = (smoothedDist - NEUTRAL_ZONE.max) / (0.3 - NEUTRAL_ZONE.max);
                targetRate = 0.5 + (ratio * 4.5); // 최대 5배속 정재생
            } else {
                targetRate = 0; // 정지 구간
            }

            // 시각화
            drawConnectors(ctx, lm, HAND_CONNECTIONS, {color: '#0f0', lineWidth: 2});
        } else {
            targetRate = 0;
        }
        ctx.restore();
    }

    // 모바일/PC 통합 시작 이벤트
    document.getElementById('overlay').addEventListener('click', async () => {
        if (isInitialized) return;
        document.getElementById('start-btn').textContent = "기다려주세요...";
        
        try {
            const camera = new Camera(webcam, {
                onFrame: async () => { await hands.send({image: webcam}); },
                width: 480, height: 360
            });
            await camera.start();
            video.play().then(() => video.pause());
            document.getElementById('overlay').style.display = 'none';
            isInitialized = true;
            update(); 
        } catch (err) {
            alert("카메라를 켤 수 없습니다: " + err);
        }
    });
</script>
</body>
</html>
